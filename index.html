<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderforest Uber-Style Navigation</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root { --primary-black: #000; --uber-green: #2ecc71; --soft-gray: #f6f6f6; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--soft-gray); }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* Floating Panel UI */
        .main-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 350px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge { background: var(--uber-green); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* Custom Search Styling */
        #search-box { margin-bottom: 20px; }
        .leaflet-control-geocoder { 
            width: 100% !important; 
            box-shadow: none !important; 
            border: 1px solid #ddd !important; 
            border-radius: 8px !important; 
        }
        .leaflet-control-geocoder-form input { width: 100% !important; padding: 10px !important; font-size: 14px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .stat-box { text-align: left; }
        .stat-label { font-size: 12px; color: #888; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: var(--primary-black); }

        .btn-primary {
            width: 100%;
            background: var(--primary-black);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* Hide Default Routing List */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="header">
        <h2 style="margin:0; font-size: 20px;">Nagivaton Panel</h2>
        <span class="badge">LIVE</span>
    </div>

    <div id="search-box">
        <label style="font-size: 12px; font-weight: bold; color: #555;">WHERE TO?</label>
        <div id="geocoder-input"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">DISTANCE</span>
            <span class="stat-value" id="dist-txt">0.0 km</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">TIME (ETA)</span>
            <span class="stat-value" id="time-txt">0 mins</span>
        </div>
    </div>

    <button class="btn-primary" onclick="startRide()">Book Ride Now</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // 1. Initialize Map with Thunderforest Atlas Layer
    const apiKey = '2ae56235ac8a49c08f776200c64186cb';
    const map = L.map('map', { zoomControl: false }).setView([28.6139, 77.2090], 14);

    L.tileLayer(`https://api.thunderforest.com/atlas/{z}/{x}/{y}.png?apikey=${apiKey}`, {
        attribution: '© Thunderforest'
    }).addTo(map);

    // 2. Custom Icons (Uber Style)
    const carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
        iconSize: [40, 40], iconAnchor: [20, 20]
    });
    const pinIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
        iconSize: [35, 35], iconAnchor: [17, 35]
    });

    // 3. Markers
    let driverMarker = L.marker([28.6139, 77.2090], { icon: carIcon }).addTo(map);
    let destMarker = L.marker([0, 0], { icon: pinIcon });

    // 4. Routing Controller (Perfect Road Calculations)
    const routingControl = L.Routing.control({
        waypoints: [],
        lineOptions: {
            styles: [{ color: '#000', opacity: 0.8, weight: 6 }]
        },
        createMarker: function() { return null; }, // Hide default blue markers
        addWaypoints: false,
        routeWhileDragging: false
    }).addTo(map);

    // 5. Search/Autocomplete Functionality
    const geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Enter destination..."
    }).on('markgeocode', function(e) {
        const destCoords = e.geocode.center;
        
        // Update Marker & Map
        destMarker.setLatLng(destCoords).addTo(map);
        map.flyTo(destCoords, 15);

        // Update Road Route
        routingControl.setWaypoints([
            driverMarker.getLatLng(),
            destCoords
        ]);
    }).addTo(map);

    // Move search bar into our custom panel
    document.getElementById('geocoder-input').appendChild(geocoder.getContainer());

    // 6. Update Stats (KM & Mins)
    routingControl.on('routesfound', function(e) {
        const summary = e.routes[0].summary;
        const km = (summary.totalDistance / 1000).toFixed(1);
        const mins = Math.round(summary.totalTime / 60);
        
        document.getElementById('dist-txt').innerText = km + ' km';
        document.getElementById('time-txt').innerText = mins + ' mins';
    });

    // 7. Simulation / Action
    function startRide() {
        if(destMarker.getLatLng().lat === 0) {
            alert("Pehle destination search karein!");
        } else {
            alert("Booking Confirmed! Road distance calculate ho gaya hai.");
            // Yahan aap live tracking ka animation shuru kar sakte hain
        }
    }

    // Optional: Real-time Movement Simulation (Testing ke liye)
    // setInterval(() => {
    //    let current = driverMarker.getLatLng();
    //    driverMarker.setLatLng([current.lat + 0.0001, current.lng + 0.0001]);
    // }, 2000);

</script>

</body>
</html>
