<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JDP CABS • Bastar Glow</title>
  <meta name="theme-color" content="#f59e0b">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glow { box-shadow: 0 0 30px rgba(245,158,11,0.5); }
    .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(24px); border: 1px solid rgba(245,158,11,0.2); }
    #map { position: fixed; inset: 0; z-index: 1; }
    .car-live { animation: liveDrive 4s linear infinite; }
    @keyframes liveDrive { 0% { transform: translateX(-20px) rotate(-5deg); } 100% { transform: translateX(20px) rotate(5deg); } }
    .tribal { background: linear-gradient(135deg, #f59e0b, #10b981); }
  </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden">

  <!-- HEADER -->
  <div class="absolute top-0 left-0 right-0 z-50 px-5 pt-6 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 tribal rounded-3xl flex items-center justify-center text-3xl glow">🌿</div>
      <div>
        <div class="text-3xl font-bold tracking-tighter text-amber-400">JDP CABS</div>
        <div class="text-xs -mt-1 text-emerald-400">Bastar Glow • Live</div>
      </div>
    </div>
    <div class="flex bg-zinc-900/80 glass rounded-3xl p-1">
      <button onclick="switchRole(0)" id="riderBtn" class="role-btn px-7 py-3 rounded-3xl font-semibold text-sm transition-all">RIDER</button>
      <button onclick="switchRole(1)" id="driverBtn" class="role-btn px-7 py-3 rounded-3xl font-semibold text-sm transition-all">DRIVER</button>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- LIVE CAR -->
  <div id="liveCar" class="absolute z-50 text-6xl pointer-events-none hidden car-live" style="bottom:42%;left:35%;">🚖</div>

  <!-- RIDER SHEET -->
  <div id="riderSheet" class="fixed bottom-0 left-0 right-0 z-50 glass rounded-t-3xl max-h-[85vh] overflow-auto">
    <div class="h-1.5 w-14 bg-amber-400 mx-auto rounded-full my-4"></div>
    <div class="px-5">
      <div class="glass rounded-3xl p-5 flex gap-4">
        <div class="text-4xl">📍</div>
        <div class="flex-1">
          <div class="text-amber-400 text-xs font-medium">PICKUP • NOW</div>
          <div id="pickupAddr" class="font-semibold text-lg">Gol Bazar, Jagdalpur</div>
        </div>
      </div>
    </div>

    <div class="px-5 mt-6">
      <div class="flex gap-4 overflow-x-auto pb-8" id="vehicleList"></div>
    </div>

    <div class="sticky bottom-0 p-5 bg-zinc-950 border-t border-amber-400/30">
      <button onclick="startBooking()" class="w-full py-6 bg-gradient-to-r from-amber-500 via-orange-500 to-amber-500 rounded-3xl font-bold text-2xl glow active:scale-95">BOOK NOW • ₹48</button>
    </div>
  </div>

  <!-- DRIVER SHEET -->
  <div id="driverSheet" class="fixed bottom-0 left-0 right-0 z-50 glass rounded-t-3xl max-h-[85vh] overflow-auto hidden">
    <div class="h-1.5 w-14 bg-emerald-400 mx-auto rounded-full my-4"></div>
    <button onclick="toggleDriverOnline()" id="onlineBtn" class="mx-5 w-[calc(100%-40px)] py-7 rounded-3xl text-2xl font-bold flex items-center justify-center gap-4 bg-emerald-600">GO ONLINE 🚀</button>
    
    <div id="driverEarnings" class="px-5 mt-6 grid grid-cols-3 gap-3">
      <div class="glass rounded-3xl p-5 text-center"><div class="text-xs text-zinc-400">TODAY</div><div class="text-3xl font-bold text-emerald-400">₹1,842</div></div>
      <div class="glass rounded-3xl p-5 text-center"><div class="text-xs text-zinc-400">TRIPS</div><div class="text-3xl font-bold">18</div></div>
      <div class="glass rounded-3xl p-5 text-center"><div class="text-xs text-zinc-400">RATING</div><div class="text-3xl font-bold text-amber-400">4.98 ★</div></div>
    </div>

    <div id="rideRequest" class="hidden mx-5 mt-6 glass rounded-3xl p-6 border border-amber-400">
      <div class="text-xl font-bold mb-4">New Ride Request!</div>
      <div class="flex justify-between items-end">
        <div>
          <div class="font-medium">Gol Bazar → Railway Station</div>
          <div class="text-emerald-400">3.4 km • ₹62 • 4 min</div>
        </div>
        <button onclick="acceptDriverRide()" class="bg-emerald-500 px-10 py-4 rounded-2xl font-bold">ACCEPT</button>
      </div>
    </div>
  </div>

  <script>
    let map, routeLine, carMarker, role = 0, isDriverOnline = false;
    let currentRide = null;

    const vehicles = [
      {id:0, name:"Auto", emoji:"🛺", fare:"₹25 + ₹9/km", time:"3 min", img:"https://picsum.photos/id/1015/600/280"},
      {id:1, name:"Mini Cab", emoji:"🚗", fare:"₹48 + ₹14/km", time:"6 min", img:"https://picsum.photos/id/1074/600/280"},
      {id:2, name:"Bike", emoji:"🏍️", fare:"₹18 + ₹7/km", time:"5 min", img:"https://picsum.photos/id/201/600/280"}
    ];

    function initMap() {
      map = L.map('map', {zoomControl:false, attributionControl:false}).setView([19.074, 82.018], 15.8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);

      // Demo route line
      routeLine = L.polyline([[19.074,82.018],[19.068,82.028]], {color:'#f59e0b', weight:6, opacity:0.9}).addTo(map);
      
      carMarker = L.marker([19.074,82.018], {
        icon: L.divIcon({html:'🚖', className:'text-5xl', iconSize:[50,50]})
      }).addTo(map);
    }

    function renderVehicles() {
      const container = document.getElementById('vehicleList');
      container.innerHTML = vehicles.map(v => `
        <div onclick="selectVehicle(${v.id})" class="vehicle-card min-w-[260px] bg-zinc-900 rounded-3xl overflow-hidden border-2 border-transparent snap-center">
          <img src="${v.img}" class="w-full h-44 object-cover">
          <div class="p-5">
            <div class="flex justify-between items-center">
              <div><span class="text-3xl">\( {v.emoji}</span> <span class="font-bold text-xl"> \){v.name}</span></div>
              <div class="text-right"><div class="text-emerald-400">\( {v.fare}</div><div class="text-xs text-zinc-400"> \){v.time}</div></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function selectVehicle(id) {
      document.querySelectorAll('.vehicle-card').forEach(el => el.classList.remove('border-amber-400'));
      document.querySelectorAll('.vehicle-card')[id].classList.add('border-amber-400');
    }

    function startBooking() {
      document.getElementById('riderSheet').style.transform = 'translateY(120%)';
      toast('🔍 Finding nearest driver in Bastar...');
      setTimeout(() => {
        switchRole(1);
        document.getElementById('rideRequest').classList.remove('hidden');
        toast('Driver found nearby!');
      }, 1800);
    }

    function acceptDriverRide() {
      document.getElementById('rideRequest').classList.add('hidden');
      toast('✅ Ride accepted! Live tracking started');
      
      // Live animation
      document.getElementById('liveCar').classList.remove('hidden');
      let pos = 0;
      const interval = setInterval(() => {
        pos += 0.0008;
        carMarker.setLatLng([19.074 - pos*2, 82.018 + pos*3]);
        if (pos > 0.015) {
          clearInterval(interval);
          toast('🏁 Ride completed! ₹62 earned');
          document.getElementById('liveCar').classList.add('hidden');
          switchRole(0);
        }
      }, 120);
    }

    function toggleDriverOnline() {
      isDriverOnline = !isDriverOnline;
      const btn = document.getElementById('onlineBtn');
      if (isDriverOnline) {
        btn.innerHTML = 'GO OFFLINE 🔴';
        btn.classList.add('bg-red-600');
        toast('🟢 You are LIVE in Jagdalpur zone');
      } else {
        btn.innerHTML = 'GO ONLINE 🚀';
        btn.classList.remove('bg-red-600');
        toast('🔴 Offline mode');
      }
    }

    function switchRole(r) {
      role = r;
      document.getElementById('riderBtn').classList.toggle('bg-amber-500', r===0);
      document.getElementById('driverBtn').classList.toggle('bg-amber-500', r===1);
      document.getElementById('riderSheet').classList.toggle('hidden', r===1);
      document.getElementById('driverSheet').classList.toggle('hidden', r===0);
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#18181b;padding:16px 28px;border-radius:9999px;font-weight:700;box-shadow:0 20px 40px rgba(245,158,11,0.3);z-index:99999;border:1px solid #f59e0b;';
      t.innerHTML = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    // 🔥 AI AUTO CRASH REPAIR SYSTEM (from your original code)
    window.AIRepair = {
      start() {
        console.log('%c🤖 JDP AI Auto-Repair v10.0 ACTIVE', 'color:#f59e0b;font-weight:bold');
        setInterval(() => {
          try {
            if (!map) initMap();
            if (document.getElementById('liveCar') && !document.getElementById('liveCar').classList.contains('hidden')) {
              // keep animation alive
            }
          } catch(e) {
            console.warn('AI Repair triggered:', e);
            location.reload(); // last resort (rare)
          }
        }, 15000);
      }
    };

    // Global error protection
    window.onerror = function() { return true; };

    // INIT
    window.onload = () => {
      initMap();
      renderVehicles();
      switchRole(0);
      window.AIRepair.start();
      setTimeout(() => document.getElementById('liveCar').classList.remove('hidden'), 1200);
      toast('🌟 World-Powerful JDP CABS Ready — Bastar Glow Edition');
    };
  </script>
</body>
</html>
